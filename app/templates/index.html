<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QuickURL — Shorten your long URLs instantly and share them anywhere.">
    <title>QuickURL — URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ─── Navbar ─── -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg class="nav-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <span>QuickURL</span>
        </a>
        <a href="https://github.com" target="_blank" rel="noopener" class="nav-github" title="View on GitHub">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
        </a>
    </nav>

    <!-- ─── Hero ─── -->
    <main class="main">
        <section class="hero">
            <h1 class="hero-title">Shorten Your Links <span class="gradient-text">Instantly</span></h1>
            <p class="hero-subtitle">Paste your long URL below and get a short shareable link in seconds</p>

            <!-- ─── Shorten Card ─── -->
            <div class="card">
                <div class="input-group">
                    <input
                        type="url"
                        id="longUrl"
                        class="url-input"
                        placeholder="Paste your long URL here..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="shortenBtn" class="btn-shorten">
                        <span class="btn-label">Shorten It</span>
                        <span class="btn-spinner" hidden>
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"></circle>
                            </svg>
                        </span>
                    </button>
                </div>

                <!-- Error message -->
                <p id="errorMsg" class="error-msg" hidden></p>

                <!-- Result -->
                <div id="result" class="result" hidden>
                    <span class="result-label">Your shortened URL:</span>
                    <div class="result-row">
                        <a id="shortLink" class="short-link" href="#" target="_blank" rel="noopener"></a>
                        <button id="copyBtn" class="btn-copy">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ─── Stats Bar ─── -->
        <div class="stats-bar">
            <p>Total URLs shortened: <span id="totalUrls" class="stat-count">loading...</span></p>
        </div>
    </main>

    <!-- ─── Toast Notification ─── -->
    <div id="toast" class="toast" hidden>Copied!</div>

    <script src="/static/script.js"></script>
</body>
</html>
